version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: prom_crm_postgres
    environment:
      POSTGRES_DB: prom_crm
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - pg_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    container_name: prom_crm_backend
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/prom_crm
      ADMIN_USER: admin
      ADMIN_PASS: admin
      SECRET_KEY: change-me
      CORS_ORIGIN: http://localhost:3000
      PROM_API_TOKEN: ''
      PROM_API_BASE_URL: https://my.prom.ua/api/v1
      PROM_PRODUCTS_ENDPOINT: /products/list
      PROM_ORDERS_ENDPOINT: /orders/list
      PROM_PAGE_SIZE: 100
      PROM_MAX_PAGES: 50
      R2_ACCOUNT_ID: ''
      R2_ACCESS_KEY_ID: ''
      R2_SECRET_ACCESS_KEY: ''
      R2_BUCKET: ''
      R2_ENDPOINT: ''
    depends_on:
      - postgres
    ports:
      - '8000:8000'

  frontend:
    build:
      context: ./frontend
    container_name: prom_crm_frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - backend
    ports:
      - '3000:3000'

volumes:
  pg_data:
